<!DOCTYPE html>
<html>
<head>
<title>Doctor Finder</title>
</head>

<body>

<h1>Doctor Finder</h1>

<table border="1">

<tr>
<th>Name</th>
<th>Specialization</th>
<th>City</th>
</tr>

{% for doctor in doctors %}

<tr>
<td>{{ doctor.name }}</td>
<td>{{ doctor.specialization }}</td>
<td>{{ doctor.city }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
